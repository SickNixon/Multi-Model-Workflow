name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    permissions:
      contents: write   # needed to create GitHub Release + upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — universal binary (Intel + Apple Silicon)
          - os: macos-latest
            args: --target universal-apple-darwin

          # Windows
          - os: windows-latest
            args: ''

          # Linux
          - os: ubuntu-latest
            args: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Node ───────────────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ── Rust ───────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary needs both targets
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system deps ──────────────────────────────────────────────────
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── npm ────────────────────────────────────────────────────────────────
      - name: Install npm deps
        run: npm ci

      # ── Tauri build + release ──────────────────────────────────────────────
      # tauri-action builds the binary, bundles the app, and attaches
      # the installer to a GitHub Release created for this tag.
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── macOS code signing (optional — leave empty for unsigned builds) ──
          # APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID:                   ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Vibe Orchestrator ${{ github.ref_name }}
          releaseBody: |
            Multi-model AI orchestrator — see README for details.
          releaseDraft: true        # review before publishing
          prerelease: false
          args: ${{ matrix.args }}
